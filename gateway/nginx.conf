log_format structured '$time_iso8601 INFO service=api-gateway '
                      'http method=$request_method uri=$request_uri '
                      'status=$status latency=$request_time\s '
                      'upstream=$upstream_addr upstream_status=$upstream_status '
                      'upstream_latency=$upstream_response_time\s '
                      'client=$remote_addr user_agent="$http_user_agent"';

access_log /var/log/nginx/access.log structured;
error_log /var/log/nginx/error.log warn;

server {
    listen 80;

    resolver 10.96.0.10 valid=10s ipv6=off;
    resolver_timeout 10s;

    set $shipping_backend "shipping-service.ecommerce.svc.cluster.local:3005";
    set $user_backend    "user-service.ecommerce.svc.cluster.local:3004";
    set $catalogue_backend "catalogue-service.ecommerce.svc.cluster.local:3002";
    set $order_backend   "order-service.ecommerce.svc.cluster.local:3003";
    set $payment_backend "payment-service.ecommerce.svc.cluster.local:3005";
    set $cart_backend    "cart-service.ecommerce.svc.cluster.local:3006";

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
    add_header 'Access-Control-Max-Age' '3600' always;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Shipping
    location /api/shipping { proxy_pass http://$shipping_backend; }

    # Users — service routes at /api/*, gateway receives /api/users/* or /users/*
    location /api/users {
        rewrite ^/api/users(.*)$ /api$1 break;
        proxy_pass http://$user_backend;
    }
    location /users {
        rewrite ^/users(.*)$ /api$1 break;
        proxy_pass http://$user_backend;
    }

    # Catalogue
    location /api/products { proxy_pass http://$catalogue_backend; }
    location /products {
        rewrite ^/products(.*)$ /api/products$1 break;
        proxy_pass http://$catalogue_backend;
    }

    # Orders
    location /api/orders { proxy_pass http://$order_backend; }
    location /orders {
        rewrite ^/orders(.*)$ /api/orders$1 break;
        proxy_pass http://$order_backend;
    }

    # Payments
    location /api/payments { proxy_pass http://$payment_backend; }
    location /payments {
        rewrite ^/payments(.*)$ /api/payments$1 break;
        proxy_pass http://$payment_backend;
    }

    # Cart
    location /api/cart { proxy_pass http://$cart_backend; }
    location /cart {
        rewrite ^/cart(.*)$ /api/cart$1 break;
        proxy_pass http://$cart_backend;
    }
}