apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-db
  namespace: ecommerce
  labels:
    app: catalogue-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue-db
  template:
    metadata:
      labels:
        app: catalogue-db
    spec:
      containers:
      - name: postgres
        image: postgres:14-alpine
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
          env:
            - name: DB_HOST
              value: catalogue-db
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_DB
          value: "catalogue_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: catalogue-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-db
  namespace: ecommerce
spec:
  type: NodePort
  ports:
  - port: 5432
    targetPort: 5432
    nodePort: 30433
  selector:
    app: catalogue-db
