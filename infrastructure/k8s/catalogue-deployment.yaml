apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-service
  namespace: ecommerce
  labels:
    app: catalogue-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: catalogue-service
  template:
    metadata:
      labels:
        app: catalogue-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node
      initContainers:
      - name: wait-for-db
        image: postgres:14-alpine
        command: ['sh', '-c', 'until pg_isready -h catalogue-db -p 5432; do echo waiting for catalogue-db; sleep 2; done']
      containers:
      - name: catalogue-service
        image: huuhai123/catalogue-service:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        env:
        - name: PORT
          value: "3002"
        - name: DB_HOST
          value: "catalogue-db"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: DB_PASSWORD
        - name: DB_DATABASE
          value: "catalogue_db"
        - name: DB_PORT
          value: "5432"
        ports:
        - containerPort: 3002
        startupProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          periodSeconds: 10
          failureThreshold: 2
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
  namespace: ecommerce
spec:
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: catalogue-service
  type: ClusterIP
