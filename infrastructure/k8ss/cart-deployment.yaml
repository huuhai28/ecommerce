apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:14
          command: ["sh", "-c", "until pg_isready -h cart-db; do sleep 2; done"]
      containers:
        - name: cart-service
          image: huuhai123/cart-service:latest
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: "cart-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "cart_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports: 
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: cart-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30003