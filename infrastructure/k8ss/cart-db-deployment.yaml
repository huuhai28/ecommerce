apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-db
  namespace: ecommerce
spec:
  replicas: 1
  selector:  
    matchLabels:
      app: cart-db
  template:
    metadata:
      labels:
        app: cart-db
    spec:
      containers:
        - name: cart-db
          image: postgres:14
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports: 
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "cart_db"
          volumeMounts:
            - name: cart-db-data
              mountPath: /var/lib/postgres/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: cart-db-data
          persistentVolumeClaim:
            claimName: cart-db-pvc
        - name: init-script
          configMap:
            name: cart-db-init
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-db-init
  namespace: ecommerce
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS carts (
      id SERIAL PRIMARY KEY,
      first_name VARCHAR(255) NOT NULL,
      last_name VARCHAR(255) NOT NULL,
      email VARCHAR(255) UNIQUE NOT NULL,
      products VARCHAR(255) NOT NULL,
      date_created TIMESTAMP DEFAULT NOW()
    );
---
apiVersion: v1
kind: Service
metadata:
  name: cart-db
  namespace: ecommerce
spec:
  selector:
    app: cart-db
  ports:
    - port: 5432
      targetPort: 5432