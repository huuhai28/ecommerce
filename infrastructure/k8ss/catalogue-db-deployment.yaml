apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-db
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue-db
  template:
    metadata:
      labels:
        app: catalogue-db
    spec:
      containers:
        - name: catalogue-db
          imagePullPolicy: IfNotPresent
          image: postgres:14
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "catalogue_db"
          volumeMounts:
            - name: catalogue-db-data
              mountPath: /var/lib/postgres/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: catalogue-db-data
          persistentVolumeClaim:
            claimName: catalogue-db-pvc
        - name: init-script
          configMap:
            name: catalogue-db-init
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue-db-init
  namespace: ecommerce
data:
 init.sql: |
    CREATE TABLE IF NOT EXISTS product_category (
      id SERIAL PRIMARY KEY,
      category_name VARCHAR(255) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS product (
      id SERIAL PRIMARY KEY,
      sku VARCHAR(255) UNIQUE,
      name VARCHAR(255) NOT NULL,
      description VARCHAR(255),
      unit_price DECIMAL(13,2) NOT NULL DEFAULT 0,
      image_url VARCHAR(255),
      active BOOLEAN DEFAULT TRUE,
      units_in_stock INTEGER DEFAULT 0,
      date_created TIMESTAMP DEFAULT NOW(),
      category_id BIGINT REFERENCES product_category(id)
    );
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-db
  namespace: ecommerce
spec:
  selector:
    app: catalogue-db
  ports:
    - port: 5432
      targetPort: 5432

