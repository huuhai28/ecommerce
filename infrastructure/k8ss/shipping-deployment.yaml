apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: ecommerce
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:14
          command: ["sh", "-c", "until pg_isready -h shipping-db; do sleep 2; done"]
      containers:
        - name: shipping-service
          image: huuhai123/shipping-service:latest
          env:
            - name: POSTGRES_shipping
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_shipping
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports: 
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: shipping-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30007