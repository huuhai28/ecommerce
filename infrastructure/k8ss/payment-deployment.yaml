apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:14
          command: ["sh", "-c", "until pg_isready -h payment-db; do sleep 2; done"]
      containers:
        - name: payment-service
          image: huuhai123/payment-service:latest
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              value: "payment-db"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "payment_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports: 
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: payment-service
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30006